<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Is It Centered Mobile</title>
<style>
  :root{
    --bg:#0d1116;
    --surface:#151b22;
    --surface-2:#1d252d;
    --surface-3:#26313a;
    --line:rgba(255,255,255,0.11);
    --text:rgba(255,255,255,0.94);
    --muted:rgba(255,255,255,0.64);
    --soft:rgba(255,255,255,0.08);
    --cyan:#35c8ff;
    --gold:#ffca55;
    --green:#51d36b;
    --red:#ff6b6b;
    --ink:#05080b;
    --dock-h:236px;
  }

  *{ box-sizing:border-box; }
  html,
  body{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior:none;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }

  body{
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  button{
    font:inherit;
    color:inherit;
    border:0;
    -webkit-tap-highlight-color:transparent;
  }

  .mobile-app{
    height:100dvh;
    min-height:100%;
    display:grid;
    grid-template-rows:auto 1fr auto;
    background:var(--bg);
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }

  .mobile-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
    border-bottom:1px solid var(--line);
    background:rgba(13,17,22,0.96);
    z-index:4;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:9px;
    min-width:0;
    font-weight:900;
    letter-spacing:0;
  }

  .brand-mark{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 0 5px rgba(53,200,255,0.14);
    flex:0 0 auto;
  }

  .brand-copy{
    min-width:0;
    display:flex;
    flex-direction:column;
    line-height:1.05;
  }

  .brand-copy span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .brand-copy small{
    color:var(--muted);
    font-size:11px;
    font-weight:800;
    margin-top:3px;
  }

  .side-toggle{
    display:grid;
    grid-template-columns:1fr 1fr;
    min-width:148px;
    padding:3px;
    border-radius:14px;
    background:var(--surface-2);
    border:1px solid var(--line);
  }

  .side-btn{
    height:38px;
    border-radius:11px;
    background:transparent;
    color:var(--muted);
    font-size:13px;
    font-weight:900;
  }

  .side-btn.active{
    background:var(--cyan);
    color:var(--ink);
  }

  .canvas-stage{
    min-height:0;
    padding:10px 10px 0;
  }

  .canvas-wrap{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    border-radius:18px 18px 0 0;
    border:1px solid var(--line);
    border-bottom:0;
    background:#090c10;
    touch-action:none;
  }

  .canvas-wrap::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:30px 30px;
    opacity:0.65;
  }

  .canvas-wrap.empty::after{
    content:"";
    position:absolute;
    inset:18px;
    border:1px dashed rgba(255,255,255,0.20);
    border-radius:14px;
    pointer-events:none;
  }

  #view{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }

  .toast{
    position:absolute;
    left:12px;
    right:12px;
    top:12px;
    z-index:7;
    display:none;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(5,8,11,0.82);
    color:var(--text);
    font-size:13px;
    font-weight:850;
    line-height:1.25;
    box-shadow:0 18px 44px rgba(0,0,0,0.30);
  }

  .loupe{
    position:absolute;
    z-index:6;
    width:136px;
    height:136px;
    margin-left:-68px;
    margin-top:-68px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.92);
    background:#111;
    box-shadow:0 18px 46px rgba(0,0,0,0.46), 0 0 0 6px rgba(53,200,255,0.20);
    overflow:hidden;
    pointer-events:none;
  }

  .loupe canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }

  .loupe::before,
  .loupe::after{
    content:"";
    position:absolute;
    z-index:2;
    background:rgba(255,255,255,0.92);
    box-shadow:0 0 8px rgba(53,200,255,0.75);
    pointer-events:none;
  }

  .loupe::before{
    width:2px;
    height:100%;
    left:50%;
    top:0;
    transform:translateX(-50%);
  }

  .loupe::after{
    height:2px;
    width:100%;
    left:0;
    top:50%;
    transform:translateY(-50%);
  }

  .loupe-dot{
    position:absolute;
    z-index:3;
    left:50%;
    top:50%;
    width:8px;
    height:8px;
    margin:-4px 0 0 -4px;
    border-radius:50%;
    background:var(--cyan);
    border:1px solid var(--ink);
    pointer-events:none;
  }

  .dock{
    min-height:var(--dock-h);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
    background:var(--surface);
    box-shadow:0 -24px 56px rgba(0,0,0,0.34);
    z-index:5;
  }

  .dock-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    min-height:28px;
  }

  .step-chip,
  .zoom-pill,
  .support-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    padding:5px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--surface-2);
    color:var(--muted);
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
  }

  .support-pill{
    text-decoration:none;
    color:var(--text);
    background:rgba(255,202,85,0.14);
    border-color:rgba(255,202,85,0.34);
    flex:0 0 auto;
  }

  .step-title{
    margin:9px 0 3px;
    font-size:22px;
    line-height:1.08;
    letter-spacing:0;
  }

  .step-text{
    margin:0;
    min-height:38px;
    color:var(--muted);
    font-size:14px;
    line-height:1.34;
  }

  .progress{
    display:flex;
    align-items:center;
    gap:7px;
    height:20px;
    margin-top:8px;
  }

  .progress-dot{
    height:6px;
    flex:1 1 0%;
    min-width:16px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
  }

  .progress-dot.done{ background:var(--green); }
  .progress-dot.active{ background:var(--cyan); }
  .progress-dot.warn{ background:var(--gold); }

  .actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
  }

  .actions.single{
    grid-template-columns:1fr;
  }

  .btn{
    min-height:48px;
    border-radius:14px;
    background:var(--surface-2);
    border:1px solid var(--line);
    font-size:15px;
    font-weight:950;
    cursor:pointer;
  }

  .btn:active{ transform:translateY(1px); }
  .btn:disabled{
    opacity:0.42;
    cursor:not-allowed;
    transform:none;
  }

  .btn.primary{
    background:var(--cyan);
    color:var(--ink);
    border-color:transparent;
  }

  .btn.secondary{
    background:var(--surface-3);
  }

  .btn.danger{
    background:rgba(255,107,107,0.16);
    border-color:rgba(255,107,107,0.34);
  }

  .results-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
  }

  .metric{
    min-width:0;
    padding:10px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--surface-2);
  }

  .metric.wide{
    grid-column:1 / -1;
  }

  .metric-label{
    color:var(--muted);
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }

  .metric-value{
    margin-top:4px;
    font-size:20px;
    line-height:1;
    font-weight:950;
    font-variant-numeric:tabular-nums;
  }

  .metric-sub{
    margin-top:5px;
    color:var(--muted);
    font-size:12px;
    line-height:1.25;
  }

  .hidden{
    display:none !important;
  }

  .file-input{
    position:fixed;
    left:-9999px;
    top:-9999px;
    width:1px;
    height:1px;
    opacity:0;
  }

  @media (min-width:680px){
    :root{ --dock-h:220px; }
    .mobile-app{
      max-width:620px;
      margin:0 auto;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
    }
  }

  @media (max-height:690px){
    :root{ --dock-h:206px; }
    .step-title{ font-size:19px; margin-top:6px; }
    .step-text{ min-height:30px; font-size:13px; }
    .btn{ min-height:44px; }
    .progress{ margin-top:5px; }
  }
</style>
</head>
<body>
<div class="mobile-app">
  <header class="mobile-top">
    <div class="brand" aria-label="Is It Centered">
      <span class="brand-mark"></span>
      <div class="brand-copy">
        <span>Is It Centered</span>
        <small id="sideStatus">Front</small>
      </div>
    </div>
    <div class="side-toggle" role="tablist" aria-label="Card side">
      <button class="side-btn active" id="frontBtn" type="button" data-side="front">Front</button>
      <button class="side-btn" id="backBtn" type="button" data-side="back">Back</button>
    </div>
  </header>

  <main class="canvas-stage">
    <div class="canvas-wrap empty" id="wrap">
      <canvas id="view" draggable="false"></canvas>
      <div class="loupe hidden" id="loupe" aria-hidden="true">
        <canvas id="loupeCanvas" width="272" height="272" draggable="false"></canvas>
        <span class="loupe-dot"></span>
      </div>
      <div class="toast" id="toast"></div>
    </div>
  </main>

  <section class="dock" id="dock" aria-live="polite">
    <div class="dock-top">
      <span class="step-chip" id="stepChip">Start</span>
      <a class="support-pill" href="https://buymeacoffee.com/redherring99" target="_blank" rel="noopener noreferrer" aria-label="Support this tool with Buy Me a Coffee">Support Me</a>
      <span class="zoom-pill" id="zoomPill">100%</span>
    </div>
    <h1 class="step-title" id="stepTitle">Load a photo</h1>
    <p class="step-text" id="stepText">Use a clear, straight-on card photo. Front and back are kept separate.</p>
    <div class="progress" id="progress"></div>

    <div class="results-grid hidden" id="resultsGrid">
      <div class="metric">
        <div class="metric-label">Left / Right</div>
        <div class="metric-value" id="lrValue">-</div>
        <div class="metric-sub" id="lrSub">Not measured</div>
      </div>
      <div class="metric">
        <div class="metric-label">Top / Bottom</div>
        <div class="metric-value" id="tbValue">-</div>
        <div class="metric-sub" id="tbSub">Not measured</div>
      </div>
      <div class="metric wide">
        <div class="metric-label">Guide</div>
        <div class="metric-sub" id="gradeSub">Measure both axes to see guidance.</div>
      </div>
    </div>

    <div class="actions" id="actions">
      <button class="btn secondary" id="secondaryBtn" type="button">Back</button>
      <button class="btn primary" id="primaryBtn" type="button">Upload photo</button>
    </div>
  </section>

  <input id="fileInput" type="file" accept="image/*" class="file-input" aria-hidden="true" tabindex="-1" />
</div>

<script src="centering-tool.mobile.obfuscated.js?v=20260509-obfuscated"></script>
</body>
</html>
